sonar.projectKey=FD-Commander
sonar.sources=.
sonar.tests=tests
sonar.host.url=http://172.16.90.156:9000

sonar.exclusions=node_modules/**,vendor/**,storage/**,bootstrap/cache/**
sonar.test.inclusions=tests/**/*.php

# Suppress false positives
# php:S1848 - Volt/Livewire component syntax (new class extends Component) is valid
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S1848
sonar.issue.ignore.multicriteria.e1.resourceKey=resources/views/**/*.blade.php
# css:S4662 - Tailwind CSS v4 @plugin, @source, @custom-variant are valid directives
sonar.issue.ignore.multicriteria.e2.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.e2.resourceKey=resources/css/**/*.css
# Web:S6851 - Alt text is clean but SonarQube flags Blade variable names ($image, $photo*)
sonar.issue.ignore.multicriteria.e3.ruleKey=Web:S6851
sonar.issue.ignore.multicriteria.e3.resourceKey=resources/views/**/*.blade.php
# php:S116 - Livewire component properties use snake_case to match wire:model bindings in Blade templates
sonar.issue.ignore.multicriteria.e4.ruleKey=php:S116
sonar.issue.ignore.multicriteria.e4.resourceKey=app/Livewire/**/*.php
# Web:S6819 - Chart widget uses ARIA roles on divs intentionally for accessible data table alongside canvas
sonar.issue.ignore.multicriteria.e5.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e5.resourceKey=resources/views/livewire/dashboard/widgets/chart.blade.php
# php:S1172 - Policy method params are required by Laravel's authorization contract even when unused in method body
sonar.issue.ignore.multicriteria.e6.ruleKey=php:S1172
sonar.issue.ignore.multicriteria.e6.resourceKey=app/Policies/**/*.php
# php:S1172 - Broadcast channel closures require $user and route params per Laravel's channel auth contract
sonar.issue.ignore.multicriteria.e7.ruleKey=php:S1172
sonar.issue.ignore.multicriteria.e7.resourceKey=routes/channels.php
# php:S1172 - Factory state closures receive $attributes per Laravel's factory contract
sonar.issue.ignore.multicriteria.e8.ruleKey=php:S1172
sonar.issue.ignore.multicriteria.e8.resourceKey=database/factories/**/*.php
# php:S1172 - Validation closure params ($attribute, $value, $fail) are required by Laravel's custom rule contract
sonar.issue.ignore.multicriteria.e9.ruleKey=php:S1172
sonar.issue.ignore.multicriteria.e9.resourceKey=app/Livewire/**/*.php
# php:S1172 - suggestPresenceType keeps coordinate params for API consistency (documented in PHPDoc)
sonar.issue.ignore.multicriteria.e10.ruleKey=php:S1172
sonar.issue.ignore.multicriteria.e10.resourceKey=app/Services/LocationDetectionService.php
# php:S1448 - Livewire components inherently have many methods (actions, computed props, lifecycle hooks)
sonar.issue.ignore.multicriteria.e11.ruleKey=php:S1448
sonar.issue.ignore.multicriteria.e11.resourceKey=app/Livewire/**/*.php
